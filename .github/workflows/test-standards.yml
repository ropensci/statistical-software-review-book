name: Test Standards Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'latest'

      - name: Install dependencies
        run: |
          install.packages("cli")
        shell: Rscript {0}

      - name: Run standards validation test
        run: make test
